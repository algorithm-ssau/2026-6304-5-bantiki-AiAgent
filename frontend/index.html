<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>PC Builder Agent</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
    textarea { width: 100%; height: 80px; margin-bottom: 10px; padding: 8px; }
    button { padding: 10px 20px; background: #4CAF50; color: white; border: none; cursor: pointer; }
    #answer { margin-top: 20px; white-space: pre-wrap; background: #f4f4f4; padding: 16px; border-radius: 8px; }
  </style>
</head>
<body>
  <h1>PC Builder Agent</h1>
  <p>Опишите задачу и бюджет — агент подберёт комплектующие</p>
  <textarea id="query" placeholder="Например: нужен комп для видеомонтажа, бюджет 80к"></textarea>
  <button onclick="sendQuery()">Подобрать</button>
  <div id="answer"></div>

  <script>
    async function sendQuery() {
      const query = document.getElementById("query").value;
      document.getElementById("answer").textContent = "Думаю...";
      const response = await fetch(`http://localhost:8000/chat?query=${encodeURIComponent(query)}`, {
        method: "POST"
      });
      const data = await response.json();
      document.getElementById("answer").textContent = data.answer;
    }
  </script>
</body>
</html>
