<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Partsy</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700&family=Nunito:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink: #ff99bd;
      --pink-light: #ffd6e7;
      --pink-dark: #e87aaa;
      --pink-ultra-light: #fff0f6;
      --bg: #fdf8fb;
      --surface: #ffffff;
      --text: #2d1f27;
      --text-secondary: #8a6875;
      --border: #f0dce8;
      --shadow: rgba(255, 153, 189, 0.15);
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Background decoration */
    body::before {
      content: '';
      position: fixed;
      top: -200px;
      right: -200px;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(255,153,189,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -150px;
      left: -150px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(255,153,189,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 28px;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      position: relative;
      z-index: 10;
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--pink), var(--pink-dark));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 4px 12px var(--shadow);
    }

    .logo-text {
      font-family: 'Nunito', sans-serif;
      font-size: 36px;
      color: var(--text);
      letter-spacing: -0.3px;
      font-weight: 700;
    }

    .header-badge {
      margin-left: auto;
      font-size: 20px;
      font-weight: 500;
      color: var(--pink-dark);
      background: var(--pink-ultra-light);
      border: 1px solid var(--pink-light);
      padding: 4px 10px;
      border-radius: 20px;
      letter-spacing: 0.3px;
    }

    /* Chat area */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: relative;
      z-index: 1;
    }

    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--pink-light); border-radius: 4px; }

    /* Welcome state */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      text-align: center;
      padding: 40px 20px;
      gap: 16px;
      animation: fadeIn 0.6s ease;
    }

    .welcome-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--pink-light), var(--pink));
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      box-shadow: 0 8px 24px var(--shadow);
      margin-bottom: 4px;
    }

    .welcome h2 {
      font-family: 'Nunito', sans-serif;
      font-size: 30px;
      color: var(--text);
      font-weight: 700;
    }

    .welcome p {
      font-size: 16px;
      color: var(--text-secondary);
      max-width: 320px;
      line-height: 1.6;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 8px;
    }

    .suggestion {
      font-size: 14px;
      color: var(--pink-dark);
      background: var(--pink-ultra-light);
      border: 1px solid var(--pink-light);
      padding: 7px 14px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
    }

    .suggestion:hover {
      background: var(--pink-light);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px var(--shadow);
    }

    /* Messages */
    .message {
      display: flex;
      gap: 10px;
      max-width: 75%;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message.bot {
      align-self: flex-start;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .message.user .avatar {
      background: linear-gradient(135deg, var(--pink), var(--pink-dark));
      box-shadow: 0 2px 8px var(--shadow);
    }

    .message.bot .avatar {
      background: linear-gradient(135deg, #f0dce8, var(--pink-light));
      box-shadow: 0 2px 8px var(--shadow);
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user .bubble {
      background: linear-gradient(135deg, var(--pink), var(--pink-dark));
      color: white;
      border-bottom-right-radius: 4px;
      box-shadow: 0 4px 12px var(--shadow);
    }

    .message.bot .bubble {
      background: var(--surface);
      color: var(--text);
      border-bottom-left-radius: 4px;
      border: 1px solid var(--border);
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }

    /* Typing indicator */
    .typing .bubble {
      padding: 14px 18px;
    }

    .typing-dots {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .typing-dots span {
      width: 6px;
      height: 6px;
      background: var(--pink);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* Input area */
    .input-area {
      padding: 16px 20px 20px;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      position: relative;
      z-index: 10;
      flex-shrink: 0;
    }

    .input-wrapper {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 10px 10px 10px 16px;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }

    .input-wrapper:focus-within {
      border-color: var(--pink);
      box-shadow: 0 0 0 4px rgba(255,153,189,0.12);
    }

    #query {
      flex: 1;
      border: none;
      outline: none;
      font-family: 'Nunito', sans-serif;
      font-size: 16px;
      color: var(--text);
      background: transparent;
      resize: none;
      max-height: 120px;
      min-height: 24px;
      line-height: 1.5;
    }

    #query::placeholder { color: #c4a8b8; }

    #sendBtn {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, var(--pink), var(--pink-dark));
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      box-shadow: 0 4px 12px var(--shadow);
    }

    #sendBtn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px var(--shadow);
    }

    #sendBtn:active { transform: translateY(0); }

    #sendBtn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    #sendBtn svg {
      width: 16px;
      height: 16px;
      fill: white;
    }

    .input-hint {
      font-size: 11px;
      color: var(--text-secondary);
      text-align: center;
      margin-top: 8px;
      opacity: 0.7;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

  <!-- Header -->
  <header>
    <a class="logo" href="#">
      <img src="logo.png" style="width:40px;height:40px;">
      <div class="logo-text">Partsy</div>
    </a>
    <div class="header-badge">✦ AI-агент</div>
  </header>

  <!-- Chat -->
  <div id="chat">
    <div class="welcome" id="welcome">
      <img src="logo.png" style="width:80px;height:80px;">
      <h2>Подберём компьютер для вас</h2>
      <p>Опишите задачу и бюджет — агент подберёт совместимые комплектующие с обоснованием каждого выбора</p>
      <div class="suggestions">
        <div class="suggestion" onclick="fillQuery('Комп для игр в 1080p, бюджет 80к')">🎮 Игровой за 80к</div>
        <div class="suggestion" onclick="fillQuery('Компьютер для видеомонтажа, бюджет 120к')">🎬 Монтаж за 120к</div>
        <div class="suggestion" onclick="fillQuery('Офисный компьютер, бюджет 40к')">💼 Офис за 40к</div>
        <div class="suggestion" onclick="fillQuery('Мощная рабочая станция для 3D рендеринга')">🔧 3D рендеринг</div>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-wrapper">
      <textarea id="query" placeholder="Опишите задачу и бюджет..." rows="1"></textarea>
      <button id="sendBtn" onclick="sendQuery()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
    <div class="input-hint">Enter для отправки · Shift+Enter для новой строки</div>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const queryEl = document.getElementById('query');
    const sendBtn = document.getElementById('sendBtn');

    // Auto-resize textarea
    queryEl.addEventListener('input', () => {
      queryEl.style.height = 'auto';
      queryEl.style.height = Math.min(queryEl.scrollHeight, 120) + 'px';
    });

    // Enter to send
    queryEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendQuery();
      }
    });

    function fillQuery(text) {
      queryEl.value = text;
      queryEl.focus();
    }

    function removeWelcome() {
      const welcome = document.getElementById('welcome');
      if (welcome) welcome.remove();
    }

    function addMessage(text, role) {
      removeWelcome();
      const msg = document.createElement('div');
      msg.className = `message ${role}`;

      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = role === 'user' ? '👤' : '🖥️';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = marked.parse(text);

      msg.appendChild(avatar);
      msg.appendChild(bubble);
      chat.appendChild(msg);
      chat.scrollTop = chat.scrollHeight;
      return msg;
    }

    function addTyping() {
      removeWelcome();
      const msg = document.createElement('div');
      msg.className = 'message bot typing';
      msg.id = 'typing';

      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = '🖥️';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';

      msg.appendChild(avatar);
      msg.appendChild(bubble);
      chat.appendChild(msg);
      chat.scrollTop = chat.scrollHeight;
    }

    function removeTyping() {
      const t = document.getElementById('typing');
      if (t) t.remove();
    }

    async function sendQuery() {
      const query = queryEl.value.trim();
      if (!query) return;

      addMessage(query, 'user');
      queryEl.value = '';
      queryEl.style.height = 'auto';
      sendBtn.disabled = true;
      addTyping();

      try {
        const response = await fetch(`http://localhost:8000/chat?query=${encodeURIComponent(query)}`, {
          method: 'POST'
        });
        const data = await response.json();
        removeTyping();
        addMessage(data.answer, 'bot');
      } catch (e) {
        removeTyping();
        addMessage('Что-то пошло не так. Убедитесь что бэкенд запущен на localhost:8000', 'bot');
      } finally {
        sendBtn.disabled = false;
        queryEl.focus();
      }
    }
  </script>
</body>
</html>
